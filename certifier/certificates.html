<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>证书管理 - 认证机构</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/certifier.css">
    <style>
        .placeholder-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f0f2f5; padding: 40px; }
        .placeholder-card { background: #fff; border-radius: 8px; border: 1px solid #ebeef5; padding: 40px; max-width: 480px; text-align: center; }
        .placeholder-card h1 { margin: 0 0 16px 0; font-size: 22px; color: #303133; }
        .placeholder-card p { color: #606266; font-size: 14px; margin: 0 0 24px 0; line-height: 1.6; }
        .placeholder-card a { margin: 0 8px; }
        .placeholder-card .btn-portal { padding: 10px 20px; background: #409EFF; color: #fff; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 14px; display: inline-block; margin-top: 8px; }
        .placeholder-card .btn-portal:hover { opacity: 0.9; }
    </style>
</head>
<body>
<div class="placeholder-page">
    <div class="placeholder-card">
        <h1>证书管理</h1>
        <p>演示占位，功能开发中。</p>
        <a href="../index.html" class="btn-portal">返回门户</a>
    </div>
</div>
</body>
</html>
