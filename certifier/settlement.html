<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>结算中心 - 认证机构</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/certifier.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.js"></script>
    <script src="../js/mockMessages.js"></script>
    <script src="../js/certifierLayout.js"></script>
    <style>
        .certifier-main { padding: 24px; background: #f0f2f5; min-height: calc(100vh - 140px); }
        .card { background: #fff; border-radius: 8px; border: 1px solid #ebeef5; padding: 20px; margin-bottom: 16px; }
        .filter-row { margin-bottom: 16px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    </style>
</head>
<body>
<div id="app" v-cloak>
    <el-container style="height: 100vh;">
        <el-aside :width="sidebarCollapsed ? '64px' : '220px'" style="background-color: #1e3a5f; display: flex; flex-direction: column;">
            <div style="height: 60px; line-height: 60px; text-align: center; color: #fff; font-weight: bold; font-size: 16px; border-bottom: 1px solid #2d4a6f; flex-shrink: 0;">第三方核查机构</div>
            <el-menu :default-active="activeMenuId" :collapse="sidebarCollapsed" background-color="#1e3a5f" text-color="#e2e8f0" active-text-color="#60a5fa" style="border-right: none; flex: 1; overflow-y: auto;">
                <template v-for="item in menuConfig" :key="item.id">
                    <el-menu-item :index="item.id" @click="openPage(item.path)">
                        <el-icon><component :is="item.icon" /></el-icon>
                        <span>{{ item.title }}</span>
                    </el-menu-item>
                </template>
            </el-menu>
            <div style="flex-shrink: 0; padding: 10px; border-top: 1px solid #2d4a6f; text-align: center;">
                <el-button link style="color: #e2e8f0; padding: 8px;" @click="toggleSidebar">
                    <el-icon><component :is="sidebarCollapsed ? 'Expand' : 'Fold'" /></el-icon>
                </el-button>
            </div>
        </el-aside>
        <el-container style="display: flex; flex-direction: column; overflow: hidden;">
            <el-header style="background: #fff; border-bottom: 1px solid #e4e7ed; height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px;">
                <el-breadcrumb separator="/">
                    <el-breadcrumb-item>认证机构工作台</el-breadcrumb-item>
                    <el-breadcrumb-item>结算中心</el-breadcrumb-item>
                </el-breadcrumb>
                <div style="display: flex; align-items: center;">
                    <el-badge :value="messageUnreadCount" :hidden="messageUnreadCount === 0" class="msg-badge">
                        <el-button link type="primary" @click="messageCenterVisible = true" style="padding: 8px;">
                            <el-icon :size="20"><component :is="'Bell'"></component></el-icon>
                        </el-button>
                    </el-badge>
                    <el-avatar :size="32" style="background: #1e40af;">SGS</el-avatar>
                    <span style="margin-left: 8px; font-size: 14px; color: #606266;">{{ currentUser.name }}</span>
                    <el-button v-if="showPortalInHeader" link type="primary" style="margin-left: 12px;" @click="goPortal">返回门户</el-button>
                </div>
            </el-header>
            <el-drawer v-model="messageCenterVisible" title="消息中心" direction="rtl" size="400" destroy-on-close>
                <div class="message-center-list">
                    <div v-for="m in messageList" :key="m.messageId" class="message-item" :class="{ unread: !m.read }" @click="goMessage(m)">
                        <div class="msg-item-title">{{ m.title }}</div>
                        <div class="msg-item-desc">{{ m.body }}</div>
                        <div class="msg-item-time">{{ formatMessageTime(m.createdAt) }}</div>
                    </div>
                    <el-empty v-if="!messageList.length" description="暂无消息" :image-size="60"></el-empty>
                </div>
            </el-drawer>
            <el-main style="padding: 24px; overflow: auto; background: #f8fafc;">
                <div class="card">
                    <div class="filter-row">
                        <el-input v-model="filterSettlementNo" placeholder="结算单号" clearable style="width: 180px;" />
                        <el-select v-model="filterStatus" placeholder="状态" clearable style="width: 120px;">
                            <el-option label="待结算" value="pending" />
                            <el-option label="已结算" value="settled" />
                            <el-option label="已驳回" value="rejected" />
                        </el-select>
                        <el-date-picker v-model="filterDateRange" type="daterange" range-separator="至" start-placeholder="开始日期" end-placeholder="结束日期" value-format="YYYY-MM-DD" style="width: 260px;" />
                        <el-button type="primary" @click="onSearch">查询</el-button>
                        <el-button @click="onReset">重置</el-button>
                    </div>
                    <el-table :data="settlementList" border stripe style="width: 100%;" :header-cell-style="{background:'#f5f7fa', color:'#606266', fontWeight:'600'}">
                        <el-table-column prop="settlementNo" label="结算单号" width="180" />
                        <el-table-column prop="period" label="结算周期" width="140" />
                        <el-table-column prop="taskCount" label="核查任务数" width="100" align="right" />
                        <el-table-column prop="amount" label="结算金额（元）" width="120" align="right" />
                        <el-table-column prop="status" label="状态" width="100">
                            <template #default="scope">
                                <el-tag v-if="scope.row.status === '已结算'" type="success" size="small">已结算</el-tag>
                                <el-tag v-else-if="scope.row.status === '待结算'" type="warning" size="small">待结算</el-tag>
                                <el-tag v-else type="info" size="small">{{ scope.row.status }}</el-tag>
                            </template>
                        </el-table-column>
                        <el-table-column prop="submitTime" label="提交时间" width="160" />
                        <el-table-column label="操作" width="120" fixed="right">
                            <template #default="scope">
                                <el-button v-if="scope.row.status === '待结算'" link type="primary" size="small">确认结算</el-button>
                                <el-button link type="primary" size="small" @click="viewDetail(scope.row)">查看</el-button>
                            </template>
                        </el-table-column>
                    </el-table>
                    <el-empty v-if="!settlementList.length" description="暂无结算记录" style="padding: 40px 0;" />
                </div>
            </el-main>
        </el-container>
    </el-container>
</div>
<script>
    const { menuConfig, currentUser, openPage, sidebarCollapsed, toggleSidebar, activeMenuId, goPortal, showPortalInHeader, messageCenterVisible, messageList, messageUnreadCount, goMessage, formatMessageTime } = CertifierLayout.setup();
    runCertifierApp({
        setup() {
            const filterSettlementNo = Vue.ref('');
            const filterStatus = Vue.ref('');
            const filterDateRange = Vue.ref(null);
            const settlementList = Vue.ref([
                { settlementNo: 'STL-2025-1101', period: '2025-10', taskCount: 12, amount: '36,000.00', status: '已结算', submitTime: '2025-11-05 14:30:00' },
                { settlementNo: 'STL-2025-1102', period: '2025-11', taskCount: 8, amount: '24,000.00', status: '待结算', submitTime: '2025-11-14 10:00:00' },
                { settlementNo: 'STL-2025-1003', period: '2025-09', taskCount: 15, amount: '45,000.00', status: '已结算', submitTime: '2025-10-08 09:20:00' }
            ]);
            const onSearch = () => { ElementPlus.ElMessage.info('已按条件筛选（演示）'); };
            const onReset = () => { filterSettlementNo.value = ''; filterStatus.value = ''; filterDateRange.value = null; };
            const viewDetail = (row) => { ElementPlus.ElMessage.info('查看结算单：' + row.settlementNo); };
            return {
                menuConfig, currentUser, openPage, sidebarCollapsed, toggleSidebar, activeMenuId, goPortal, showPortalInHeader,
                messageCenterVisible, messageList, messageUnreadCount, goMessage, formatMessageTime,
                filterSettlementNo, filterStatus, filterDateRange, settlementList, onSearch, onReset, viewDetail
            };
        }
    });
</script>
</body>
</html>
