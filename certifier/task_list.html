<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>待核查任务 - 认证机构</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/certifier.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.js"></script>
    <style>
        .certifier-header { background: #fff; border-bottom: 1px solid #e4e7ed; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .certifier-main { padding: 24px; background: #f0f2f5; min-height: calc(100vh - 70px); }
        .card { background: #fff; border-radius: 4px; border: 1px solid #ebeef5; padding: 20px; margin-bottom: 16px; }
    </style>
</head>
<body>
<div id="app" v-cloak>
    <div class="certifier-header">
        <div>
            <span style="font-weight: 600; color: #303133;">认证机构工作台</span>
            <span style="color: #909399; margin-left: 16px;">待核查任务</span>
        </div>
        <el-button link type="primary" @click="goPortal">返回门户</el-button>
    </div>
    <div class="certifier-main">
        <div class="card">
            <p style="color: #606266; font-size: 13px; margin: 0 0 16px 0;">请对以下任务的核算报告与凭证进行穿透查看，并反馈通过/驳回/澄清意见。</p>
            <el-table :data="taskList" border stripe style="width: 100%;" :header-cell-style="{background:'#f5f7fa', color:'#606266', fontWeight:'600'}">
                <el-table-column prop="taskId" label="任务编号" width="160" />
                <el-table-column prop="orderNo" label="关联订单" width="160" />
                <el-table-column prop="productName" label="产品名称" min-width="140" />
                <el-table-column prop="supplier" label="供应商" width="140" />
                <el-table-column prop="status" label="状态" width="100">
                    <template #default="scope">
                        <el-tag size="small" type="warning">待核查</el-tag>
                    </template>
                </el-table-column>
                <el-table-column label="操作" width="100" align="center" fixed="right">
                    <template #default="scope">
                        <el-button link type="primary" size="small" @click="goDetail(scope.row)">核查</el-button>
                    </template>
                </el-table-column>
            </el-table>
            <el-empty v-if="!taskList.length" description="暂无待核查任务" style="padding: 40px 0;" />
        </div>
    </div>
</div>
<script>
    const { createApp } = Vue;
    const app = createApp({
        setup() {
            const taskList = Vue.ref([
                { taskId: 'TSK-2026-888', orderNo: 'ORD-20260203-001', productName: '超高功率石墨电极', supplier: '南通碳素有限公司', status: '待核查' },
                { taskId: 'TSK-2025-999', orderNo: 'ORD-20251212-015', productName: '汽车结构钢', supplier: '马钢股份', status: '待核查' }
            ]);
            const goPortal = () => { window.location.href = '../index.html'; };
            const goDetail = (row) => { window.location.href = 'task_detail.html?taskId=' + encodeURIComponent(row.taskId); };
            return { taskList, goPortal, goDetail };
        }
    });
    const localeOpt = typeof ElementPlusLocaleZhCn !== 'undefined' ? { locale: ElementPlusLocaleZhCn } : {};
    app.use(ElementPlus, localeOpt);
    app.mount('#app');
</script>
</body>
</html>
