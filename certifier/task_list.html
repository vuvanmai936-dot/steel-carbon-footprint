<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>待核查任务 - 认证机构</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/certifier.css">
    <script src="../js/mockTasks.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.js"></script>
    <script src="../js/mockMessages.js"></script>
    <script src="../js/certifierLayout.js"></script>
    <style>
        .card { background: #fff; border-radius: 8px; border: 1px solid #ebeef5; padding: 20px; margin-bottom: 16px; }
        /* 与运营/供应商端信息结构一致的列表样式，主题色保持核查端身份 */
        .main-flex-wrapper { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .list-card-container { flex: 1; display: flex; flex-direction: column; min-height: 0; background: #fff; border: 1px solid #ebeef5; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
        .table-wrapper { flex: 1; overflow: auto; padding: 10px 15px 50px 15px; position: relative; }
        .pagination-footer { position: absolute; bottom: 0; left: 0; right: 0; height: 50px; border-top: 1px solid #ebeef5; background: #fff; display: flex; align-items: center; justify-content: flex-end; padding: 0 20px; z-index: 10; }
        .search-card { padding: 18px 20px; background: #fff; border: 1px solid #ebeef5; border-radius: 8px; margin-bottom: 15px; flex-shrink: 0; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
        .info-group { display: flex; align-items: flex-start; width: 100%; }
        .info-text-wrapper { flex: 1; min-width: 0; overflow: hidden; }
        .info-icon-box { width: 36px; height: 36px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-right: 12px; background: #dbeafe; color: #2563eb; border: 1px solid #93c5fd; }
        .info-main-text { font-weight: 600; color: #1e40af; font-size: 14px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        .info-main-text:hover { color: #1d4ed8; text-decoration: underline; }
        .info-sub-text { font-family: monospace; color: #909399; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-steps { display: flex; align-items: center; width: 100%; }
        .mini-steps .step-item { flex: 1; height: 4px; background: #EBEEF5; margin-right: 2px; border-radius: 2px; }
        .mini-steps .step-item:last-child { margin-right: 0; }
        .mini-steps .step-item.active { background: #60a5fa; }
        .mini-steps .step-item.done { background: #67C23A; }
        .step-labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: #C0C4CC; }
        .step-label-active { color: #2563eb; font-weight: bold; }
        .step-label-done { color: #67C23A; }
        .certifier-task-table .el-table__body tr:hover > td { background-color: #eff6ff !important; }
    </style>
</head>
<body>
<div id="app" v-cloak>
    <el-container style="height: 100vh;">
        <el-aside :width="sidebarCollapsed ? '64px' : '220px'" style="background-color: #1e3a5f; display: flex; flex-direction: column;">
            <div style="height: 60px; line-height: 60px; text-align: center; color: #fff; font-weight: bold; font-size: 16px; border-bottom: 1px solid #2d4a6f; flex-shrink: 0;">第三方核查机构</div>
            <el-menu :default-active="activeMenuId" :collapse="sidebarCollapsed" background-color="#1e3a5f" text-color="#e2e8f0" active-text-color="#60a5fa" style="border-right: none; flex: 1; overflow-y: auto;">
                <template v-for="item in menuConfig" :key="item.id">
                    <el-menu-item :index="item.id" @click="openPage(item.path)">
                        <el-icon><component :is="item.icon" /></el-icon>
                        <span>{{ item.title }}</span>
                    </el-menu-item>
                </template>
            </el-menu>
            <div style="flex-shrink: 0; padding: 10px; border-top: 1px solid #2d4a6f; text-align: center;">
                <el-button link style="color: #e2e8f0; padding: 8px;" @click="toggleSidebar">
                    <el-icon><component :is="sidebarCollapsed ? 'Expand' : 'Fold'" /></el-icon>
                </el-button>
            </div>
        </el-aside>
        <el-container style="display: flex; flex-direction: column; overflow: hidden;">
            <el-header style="background: #fff; border-bottom: 1px solid #e4e7ed; height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px;">
                <el-breadcrumb separator="/">
                    <el-breadcrumb-item>认证机构工作台</el-breadcrumb-item>
                    <el-breadcrumb-item>待核查任务</el-breadcrumb-item>
                </el-breadcrumb>
                <div style="display: flex; align-items: center;">
                    <el-badge :value="messageUnreadCount" :hidden="messageUnreadCount === 0" class="msg-badge">
                        <el-button link type="primary" @click="messageCenterVisible = true" style="padding: 8px;">
                            <el-icon :size="20"><component :is="'Bell'"></component></el-icon>
                        </el-button>
                    </el-badge>
                    <el-avatar :size="32" style="background: #1e40af;">SGS</el-avatar>
                    <span style="margin-left: 8px; font-size: 14px; color: #606266;">{{ currentUser.name }}</span>
                    <el-button v-if="showPortalInHeader" link type="primary" style="margin-left: 12px;" @click="goPortal">返回门户</el-button>
                </div>
            </el-header>
            <el-drawer v-model="messageCenterVisible" title="消息中心" direction="rtl" size="400" destroy-on-close>
                <div class="message-center-list">
                    <div v-for="m in messageList" :key="m.messageId" class="message-item" :class="{ unread: !m.read }" @click="goMessage(m)">
                        <div class="msg-item-title">{{ m.title }}</div>
                        <div class="msg-item-desc">{{ m.body }}</div>
                        <div class="msg-item-time">{{ formatMessageTime(m.createdAt) }}</div>
                    </div>
                    <el-empty v-if="!messageList.length" description="暂无消息" :image-size="60"></el-empty>
                </div>
            </el-drawer>
            <el-main style="padding: 24px; overflow: hidden; background: #f8fafc;">
                <div class="main-flex-wrapper">
                    <div class="search-card">
                        <p style="color: #606266; font-size: 13px; margin: 0 0 12px 0;">请对以下任务的核算报告与凭证进行穿透查看，并反馈通过/驳回/澄清意见。</p>
                        <el-form :inline="true" size="default" style="margin-bottom: -18px;">
                            <el-form-item label="关键词">
                                <el-input v-model="searchKeyword" placeholder="任务编号 / 订单号 / 产品" clearable style="width: 220px;">
                                    <template #prefix><el-icon><component :is="'Search'" /></el-icon></template>
                                </el-input>
                            </el-form-item>
                            <el-form-item>
                                <el-button type="primary" @click="currentPage = 1">查询</el-button>
                                <el-button @click="handleReset">重置</el-button>
                            </el-form-item>
                        </el-form>
                    </div>
                    <div class="list-card-container">
                        <div v-if="filteredTaskList.length" class="table-wrapper">
                            <el-table
                                :data="paginatedTaskList"
                                border
                                stripe
                                class="certifier-task-table"
                                style="width: 100%;"
                                :header-cell-style="{ background: '#f5f7fa', color: '#606266', fontWeight: '600' }"
                                @row-click="handleRowClick"
                            >
                                <el-table-column label="任务信息" min-width="260" show-overflow-tooltip>
                                    <template #default="scope">
                                        <div class="info-group">
                                            <div class="info-icon-box"><el-icon><component :is="'List'" /></el-icon></div>
                                            <div class="info-text-wrapper">
                                                <div class="info-main-text" @click.stop="goDetail(scope.row)">{{ scope.row.taskId }}</div>
                                                <div class="info-sub-text">ORD: {{ scope.row.orderNo }}</div>
                                            </div>
                                        </div>
                                    </template>
                                </el-table-column>
                                <el-table-column label="产品与规格" min-width="160" show-overflow-tooltip>
                                    <template #default="scope">
                                        <div style="font-weight: 500;">{{ scope.row.productName }}</div>
                                        <div style="font-size: 12px; color: #909399;">{{ scope.row.specs || '—' }}</div>
                                    </template>
                                </el-table-column>
                                <el-table-column label="供应商" prop="supplier" width="140" show-overflow-tooltip></el-table-column>
                                <el-table-column label="当前阶段 / 进度" width="400">
                                    <template #default="scope">
                                        <div class="mini-steps">
                                            <div class="step-item" :class="getStepClass(scope.row.stageIndex, 0)"></div>
                                            <div class="step-item" :class="getStepClass(scope.row.stageIndex, 1)"></div>
                                            <div class="step-item" :class="getStepClass(scope.row.stageIndex, 2)"></div>
                                            <div class="step-item" :class="getStepClass(scope.row.stageIndex, 3)"></div>
                                            <div class="step-item" :class="getStepClass(scope.row.stageIndex, 4)"></div>
                                        </div>
                                        <div class="step-labels">
                                            <span :class="getLabelClass(scope.row.stageIndex, 0)">配置</span>
                                            <span :class="getLabelClass(scope.row.stageIndex, 1)">采集</span>
                                            <span :class="getLabelClass(scope.row.stageIndex, 2)">计算</span>
                                            <span :class="getLabelClass(scope.row.stageIndex, 3)">核查</span>
                                            <span :class="getLabelClass(scope.row.stageIndex, 4)">报告</span>
                                        </div>
                                        <div style="margin-top: 6px; font-size: 11px; color: #606266;">
                                            <span>核查：{{ getStageStatusText(scope.row) }}</span>
                                        </div>
                                    </template>
                                </el-table-column>
                                <el-table-column label="状态" width="100">
                                    <template #default="scope">
                                        <el-tag size="small" type="warning">待核查</el-tag>
                                    </template>
                                </el-table-column>
                                <el-table-column label="操作" width="100" align="center" fixed="right">
                                    <template #default="scope">
                                        <el-button link type="primary" size="small" @click.stop="goDetail(scope.row)">核查</el-button>
                                    </template>
                                </el-table-column>
                            </el-table>
                        </div>
                        <div v-if="filteredTaskList.length" class="pagination-footer">
                            <el-pagination
                                background
                                layout="total, sizes, prev, pager, next"
                                :total="filteredTaskList.length"
                                :page-sizes="[10, 20, 50]"
                                v-model:current-page="currentPage"
                                v-model:page-size="pageSize"
                            />
                        </div>
                        <div v-if="!filteredTaskList.length" style="min-height: 280px; display: flex; align-items: center; justify-content: center;">
                            <el-empty description="暂无待核查任务" />
                        </div>
                    </div>
                </div>
            </el-main>
        </el-container>
    </el-container>
</div>
<script>
    const { menuConfig, currentUser, openPage, sidebarCollapsed, toggleSidebar, activeMenuId, goPortal, showPortalInHeader, messageCenterVisible, messageList, messageUnreadCount, goMessage, formatMessageTime } = CertifierLayout.setup();
    runCertifierApp({
        setup() {
            const rawList = typeof getCertifierTaskList === 'function' ? getCertifierTaskList() : [];
            const taskList = Vue.ref(rawList);
            const searchKeyword = Vue.ref('');
            const currentPage = Vue.ref(1);
            const pageSize = Vue.ref(10);

            const filteredTaskList = Vue.computed(() => {
                let list = taskList.value || [];
                if (searchKeyword.value) {
                    const kw = searchKeyword.value.trim().toLowerCase();
                    list = list.filter(function (r) {
                        return (r.taskId || '').toLowerCase().includes(kw) ||
                            (r.orderNo || '').toLowerCase().includes(kw) ||
                            (r.productName || '').toLowerCase().includes(kw) ||
                            (r.supplier || '').toLowerCase().includes(kw);
                    });
                }
                return list;
            });

            const paginatedTaskList = Vue.computed(function () {
                const list = filteredTaskList.value || [];
                const start = (currentPage.value - 1) * pageSize.value;
                return list.slice(start, start + pageSize.value);
            });

            const getStepClass = function (current, step) {
                if (current > step) return 'done';
                if (current === step) return 'active';
                return '';
            };
            const getLabelClass = function (current, labelIndex) {
                if (current > labelIndex) return 'step-label-done';
                if (current === labelIndex) return 'step-label-active';
                return '';
            };
            const getStageStatusText = function (row) {
                return typeof window.getStageStatusText === 'function' ? window.getStageStatusText(row) : (row.stageSubStatus === 'pending_review' ? '待运营验收' : '—');
            };

            const handleReset = function () {
                searchKeyword.value = '';
                currentPage.value = 1;
            };

            const goDetail = function (row) {
                window.location.href = 'task_detail.html?taskId=' + encodeURIComponent(row.taskId);
            };
            const handleRowClick = function (row) {
                goDetail(row);
            };

            Vue.watch(searchKeyword, function () { currentPage.value = 1; });

            return {
                menuConfig, currentUser, openPage, sidebarCollapsed, toggleSidebar, activeMenuId, goPortal, showPortalInHeader,
                messageCenterVisible, messageList, messageUnreadCount, goMessage, formatMessageTime,
                taskList, searchKeyword, currentPage, pageSize,
                filteredTaskList, paginatedTaskList,
                getStepClass, getLabelClass, getStageStatusText,
                handleReset, goDetail, handleRowClick
            };
        }
    });
</script>
</body>
</html>
