<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>报告管理 - 中心运营端</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/operator.css">
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/mockOperator.js"></script>
    
    <style>
        /* === 1. 布局核心样式 === */

        .main-flex-wrapper { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .list-card-container { flex: 1; display: flex; flex-direction: column; min-height: 0; background: #fff; border: 1px solid #ebeef5; border-radius: 4px; overflow: hidden; }
        .table-wrapper { flex: 1; overflow: hidden; padding: 10px 15px 50px 15px; position: relative; }
        .pagination-footer { position: absolute; bottom: 0; left: 0; right: 0; height: 50px; border-top: 1px solid #ebeef5; background: #fff; display: flex; align-items: center; justify-content: flex-end; padding: 0 20px; z-index: 10; }
        .search-card { padding: 18px 20px; background: #fff; border: 1px solid #ebeef5; border-radius: 4px; margin-bottom: 15px; flex-shrink: 0; }

        /* === 2. 列表内容样式 === */
        .info-group { display: flex; align-items: flex-start; width: 100%; }
        .info-text-wrapper { flex: 1; min-width: 0; overflow: hidden; } 
        
        .info-icon-box {
            width: 36px; height: 36px; border-radius: 6px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; margin-right: 12px;
            background: #f9f0ff; color: #722ed1; border: 1px solid #ebd6ff;
        }
        .info-main-text { font-weight: 600; color: #303133; font-size: 14px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info-sub-text { font-family: monospace; color: #909399; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 状态徽章 */
        .status-badge { display: inline-flex; align-items: center; padding: 0 10px; border-radius: 12px; font-size: 12px; height: 24px; box-sizing: border-box; white-space: nowrap; border: 1px solid transparent; }
        .status-process { background: #e6f7ff; color: #1890ff; border-color: #91d5ff; }
        .status-archived { background: #f6ffed; color: #52c41a; border-color: #b7eb8f; }
        .status-revoked { background: #fff1f0; color: #f5222d; border-color: #ffa39e; }
        .status-appeal { background: #fdf6ec; color: #E6A23C; border-color: #f5dab1; margin-left: 4px; }

        .doc-dots { display: flex; gap: 6px; margin-top: 4px; }
        .doc-dot { width: 8px; height: 8px; border-radius: 50%; background: #e4e7ed; }
        .doc-dot.active { background: #67C23A; }
        .doc-dot-label { font-size: 12px; color: #999; margin-left: 4px; }
        .version-draft { color: #909399; font-size: 12px; }
        .version-sealed { color: #67C23A; font-size: 12px; }
    </style>
</head>
<body>
<div id="app" v-cloak>
    <el-container style="height: 100vh;">
        <el-aside :width="sidebarCollapsed ? '64px' : '220px'" style="background-color: #001529; display: flex; flex-direction: column;">
            <div style="height: 60px; line-height: 60px; text-align: center; color: #fff; font-weight: bold; font-size: 18px; border-bottom: 1px solid #002140; flex-shrink: 0;">
                碳足迹数据服务
            </div>
            <el-menu :default-active="activeMenuId" :collapse="sidebarCollapsed" background-color="#001529" text-color="#fff" active-text-color="#409EFF" style="border-right: none; flex: 1; overflow-y: auto;">
                <template v-for="item in menuConfig" :key="item.id">
                    <el-sub-menu v-if="item.children" :index="item.id">
                        <template #title>
                            <el-icon><component :is="item.icon" /></el-icon>
                            <span>{{ item.title }}</span>
                        </template>
                        <el-menu-item v-for="child in item.children" :key="child.id" :index="child.id" @click="openPage(child.path)">
                            {{ child.title }}
                        </el-menu-item>
                    </el-sub-menu>
                    <el-menu-item v-else :index="item.id" @click="openPage(item.path)">
                        <el-icon><component :is="item.icon" /></el-icon>
                        <span>{{ item.title }}</span>
                    </el-menu-item>
                </template>
            </el-menu>
            <div style="flex-shrink: 0; padding: 10px; border-top: 1px solid #002140; text-align: center;">
                <el-button link style="color: #fff; padding: 8px;" @click="toggleSidebar">
                    <el-icon><component :is="sidebarCollapsed ? 'Expand' : 'Fold'" /></el-icon>
                </el-button>
            </div>
        </el-aside>

        <el-container style="display: flex; flex-direction: column; overflow: hidden;">
            <el-header style="background: #fff; border-bottom: 1px solid #dcdfe6; height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; flex-shrink: 0;">
                <el-breadcrumb separator="/">
                    <el-breadcrumb-item>中心运营端</el-breadcrumb-item>
                    <el-breadcrumb-item>报告管理</el-breadcrumb-item>
                </el-breadcrumb>
                <div style="display: flex; align-items: center;">
                    <el-avatar :size="32" style="background: #409EFF;">管</el-avatar>
                    <span style="margin-left: 8px; font-size: 14px; color: #606266;">{{ currentUser.name }}</span>
                </div>
            </el-header>

            <el-main style="padding: 20px; overflow: hidden; background: #f0f2f5;">
                <div class="main-flex-wrapper">
                    <div class="search-card">
                        <el-form :inline="true" :model="query" style="margin-bottom: -18px;">
                            <el-form-item label="任务/订单">
                                <el-input v-model="query.taskNo" placeholder="编号或产品名称" clearable prefix-icon="Search" style="width: 200px;">
                                    <template #prefix><el-icon><component :is="'Search'"></component></el-icon></template>
                                </el-input>
                            </el-form-item>
                            <el-form-item label="供应商">
                                <el-select v-model="query.supplier" placeholder="全部" filterable clearable style="width: 160px;">
                                    <el-option label="扬州德云电气" value="1"></el-option>
                                    <el-option label="XX 耐火材料" value="2"></el-option>
                                    <el-option label="南钢股份" value="3"></el-option>
                                </el-select>
                            </el-form-item>
                            <el-form-item label="核查机构">
                                <el-select v-model="query.verifier" placeholder="全部" clearable style="width: 140px;">
                                    <el-option label="SGS 通标" value="sgs"></el-option>
                                    <el-option label="DNV" value="dnv"></el-option>
                                    <el-option label="TUV 莱茵" value="tuv"></el-option>
                                </el-select>
                            </el-form-item>
                            <el-form-item label="归档时间">
                                <el-date-picker v-model="query.dateRange" type="daterange" start-placeholder="开始" end-placeholder="结束" style="width: 220px;"></el-date-picker>
                            </el-form-item>
                            <el-form-item label="报告状态">
                                <el-select v-model="query.status" placeholder="全部" clearable style="width: 110px;">
                                    <el-option label="流转中" value="process"></el-option>
                                    <el-option label="已归档" value="archived"></el-option>
                                    <el-option label="已作废" value="revoked"></el-option>
                                </el-select>
                            </el-form-item>
                            <el-form-item label="仅待处理申诉">
                                <el-checkbox v-model="query.appealOnly">只看申诉中</el-checkbox>
                            </el-form-item>
                            <el-form-item>
                                <el-button type="primary" icon="Search" @click="handleSearch">查询</el-button>
                                <el-button icon="Refresh" @click="handleReset">重置</el-button>
                            </el-form-item>
                        </el-form>
                    </div>

                    <div class="list-card-container">
                        <div class="table-wrapper">
                            <el-table 
                                :data="filteredReportList" 
                                border 
                                stripe 
                                style="width: 100%; height: 100%;" 
                                :header-cell-style="{background:'#f5f7fa', color:'#606266', fontWeight:'600'}"
                            >
                                <el-table-column label="交付档案包 (Package)" min-width="240" fixed show-overflow-tooltip>
                                    <template #default="scope">
                                        <div class="info-group">
                                            <div class="info-icon-box"><el-icon><component :is="'FolderOpened'"></component></el-icon></div>
                                            <div class="info-text-wrapper">
                                                <div class="info-main-text" style="color: #409EFF; cursor: pointer;" @click="viewDetail(scope.row)">
                                                    {{ scope.row.taskNo }}
                                                </div>
                                                <div class="info-sub-text">Ord: {{ scope.row.orderNo }}</div>
                                            </div>
                                        </div>
                                    </template>
                                </el-table-column>

                                <el-table-column label="核算产品" prop="productName" min-width="180" show-overflow-tooltip></el-table-column>
                                <el-table-column label="供应商" prop="supplierName" width="180" show-overflow-tooltip></el-table-column>
                                <el-table-column label="核查机构" prop="verifier" width="140" show-overflow-tooltip></el-table-column>

                                <el-table-column label="报告版本" width="120" align="center">
                                    <template #default="scope">
                                        <span v-if="scope.row.reportVersion === 'draft'" class="version-draft">草稿</span>
                                        <span v-else class="version-sealed">用印版 V1</span>
                                    </template>
                                </el-table-column>

                                <el-table-column label="三件套状态" width="180">
                                    <template #default="scope">
                                        <div class="doc-dots">
                                            <el-tooltip content="核算报告"><div :class="['doc-dot', scope.row.docs.calc ? 'active' : '']"></div></el-tooltip>
                                            <el-tooltip content="核查报告"><div :class="['doc-dot', scope.row.docs.verify ? 'active' : '']"></div></el-tooltip>
                                            <el-tooltip content="声明证书"><div :class="['doc-dot', scope.row.docs.cert ? 'active' : '']"></div></el-tooltip>
                                            <span class="doc-dot-label">{{ getDocStatusText(scope.row.docs) }}</span>
                                        </div>
                                    </template>
                                </el-table-column>

                                <el-table-column label="报告状态" width="160" align="center">
                                    <template #default="scope">
                                        <span v-if="scope.row.status === 'process'" class="status-badge status-process">流转中</span>
                                        <span v-else-if="scope.row.status === 'archived'" class="status-badge status-archived">已归档</span>
                                        <span v-else class="status-badge status-revoked">已作废</span>
                                        <span v-if="scope.row.appeal" class="status-badge status-appeal">申诉中</span>
                                    </template>
                                </el-table-column>

                                <el-table-column label="操作" width="300" fixed="right" align="center">
                                    <template #default="scope">
                                        <template v-if="scope.row.appeal && scope.row.status !== 'process' && scope.row.status !== 'archived'">
                                            <el-button link type="primary" @click="viewDetail(scope.row)">查看档案</el-button>
                                            <el-divider direction="vertical"></el-divider>
                                            <el-button link type="danger" @click="rejectAppeal(scope.row)">驳回申诉</el-button>
                                            <el-button link type="primary" @click="acceptAppeal(scope.row)">接受申诉</el-button>
                                        </template>
                                        <template v-else-if="scope.row.status === 'process'">
                                            <template v-if="scope.row.reportVersion === 'draft'">
                                                <el-button link type="warning" @click="openUploadSealed(scope.row)">上传用印版</el-button>
                                                <el-divider direction="vertical"></el-divider>
                                            </template>
                                            <template v-else-if="!scope.row.releasedToSupplier">
                                                <el-button link type="primary" @click="openReleaseDialog(scope.row)">下发</el-button>
                                                <el-divider direction="vertical"></el-divider>
                                            </template>
                                            <el-button link type="primary" @click="viewDetail(scope.row)">{{ scope.row.releasedToSupplier ? '归档管理' : '查看档案' }}</el-button>
                                            <el-divider direction="vertical"></el-divider>
                                            <el-button link type="success" :disabled="true" @click="downloadPackage(scope.row)">下载</el-button>
                                        </template>
                                        <template v-else>
                                            <el-button link type="primary" @click="viewDetail(scope.row)">查看档案</el-button>
                                            <el-divider direction="vertical"></el-divider>
                                            <el-button link type="success" :disabled="scope.row.status !== 'archived'" @click="downloadPackage(scope.row)">下载</el-button>
                                        </template>
                                    </template>
                                </el-table-column>
                            </el-table>
                            <el-empty v-if="!filteredReportList.length" description="暂无报告" class="list-empty-wrap"></el-empty>
                        </div>

                        <!-- 上传用印版核算报告 -->
                        <el-dialog v-model="uploadSealedVisible" title="上传用印版核算报告" width="480px" destroy-on-close>
                            <p style="color: #606266; margin-bottom: 12px;">用于替换此前流转给核查机构的草稿，系统将记录版本（草稿 → 用印版 V1），作为下发的前置条件。</p>
                            <el-upload
                                drag
                                :auto-upload="false"
                                :limit="1"
                                accept=".pdf"
                                :on-change="onSealedFileChange"
                            >
                                <el-icon class="el-icon--upload"><component :is="'Upload'"></component></el-icon>
                                <div class="el-upload__text">将用印版 PDF 拖到此处，或<em>点击上传</em></div>
                            </el-upload>
                            <template #footer>
                                <el-button @click="uploadSealedVisible = false">取消</el-button>
                                <el-button type="primary" @click="submitUploadSealed">确认上传</el-button>
                            </template>
                        </el-dialog>

                        <!-- 勾选报告/证书并下发至供应商 -->
                        <el-dialog v-model="releaseDialogVisible" title="下发报告/证书至供应商" width="440px" destroy-on-close>
                            <p style="color: #606266; margin-bottom: 12px;">勾选要下发的报告或证书，确认后供应商将在「我的报告」中可见并可确认接收或申诉。</p>
                            <el-checkbox-group v-model="releaseChecked">
                                <div style="margin-bottom: 8px;"><el-checkbox label="calc">核算报告</el-checkbox></div>
                                <div style="margin-bottom: 8px;"><el-checkbox label="verify">核查报告</el-checkbox></div>
                                <div style="margin-bottom: 8px;"><el-checkbox label="cert">声明证书</el-checkbox></div>
                            </el-checkbox-group>
                            <template #footer>
                                <el-button @click="releaseDialogVisible = false">取消</el-button>
                                <el-button type="primary" :disabled="releaseChecked.length === 0" @click="submitRelease">确认下发</el-button>
                            </template>
                        </el-dialog>

                        <div class="pagination-footer">
                            <el-pagination background layout="total, sizes, prev, pager, next, jumper" :total="filteredReportList.length" :page-sizes="[10, 20, 50]" :current-page="1"></el-pagination>
                        </div>
                    </div>
                </div>
            </el-main>
        </el-container>

    </el-container>
</div>

<script>
    const { menuConfig, currentUser, openPage, sidebarCollapsed, toggleSidebar, activeMenuId } = SharedLayout.setup();

    runOperatorApp({
        setup() {
            const query = Vue.reactive({ taskNo: '', supplier: '', verifier: '', status: '', dateRange: [], appealOnly: false });
            const rawList = JSON.parse(JSON.stringify(MOCK_REPORTS));
            rawList.forEach(r => {
                if (r.reportVersion === undefined) r.reportVersion = r.status === 'process' ? 'draft' : 'sealed';
                if (r.releasedToSupplier === undefined) r.releasedToSupplier = r.status === 'archived';
            });
            const reportList = Vue.ref(rawList);

            const uploadSealedVisible = Vue.ref(false);
            const releaseDialogVisible = Vue.ref(false);
            const releaseChecked = Vue.ref([]);
            const currentUploadRow = Vue.ref(null);
            const currentReleaseRow = Vue.ref(null);

            const filteredReportList = Vue.computed(() => {
                let list = reportList.value;
                if (query.appealOnly) list = list.filter(r => r.appeal);
                if (query.status) list = list.filter(r => r.status === query.status);
                return list;
            });

            const getDocStatusText = (docs) => {
                let count = 0;
                if(docs.calc) count++;
                if(docs.verify) count++;
                if(docs.cert) count++;
                return `${count}/3 齐备`;
            };

            const handleSearch = () => ElementPlus.ElMessage.success('列表已刷新');
            const handleReset = () => { Object.keys(query).forEach(k => { query[k] = (k === 'dateRange' ? [] : k === 'appealOnly' ? false : ''); }); };
            const viewDetail = (row) => { window.location.href = 'report_detail.html?taskNo=' + encodeURIComponent(row.taskNo); };
            const downloadPackage = (row) => ElementPlus.ElMessage.success('开始打包下载交付物...');

            const onSealedFileChange = () => {};
            const openUploadSealed = (row) => { currentUploadRow.value = row; uploadSealedVisible.value = true; };
            const submitUploadSealed = () => {
                const row = currentUploadRow.value;
                if (row) { row.reportVersion = 'sealed'; if (!row.history) row.history = []; row.history.unshift({ title: '用印版已上传', desc: '草稿 → 用印版 V1', timestamp: new Date().toLocaleString('zh-CN'), type: 'success' }); }
                uploadSealedVisible.value = false; currentUploadRow.value = null;
                ElementPlus.ElMessage.success('用印版已上传，版本已记录为「用印版 V1」');
            };

            const openReleaseDialog = (row) => { currentReleaseRow.value = row; releaseChecked.value = []; releaseDialogVisible.value = true; };
            const submitRelease = () => {
                const row = currentReleaseRow.value;
                if (row) { row.releasedToSupplier = true; if (!row.history) row.history = []; row.history.unshift({ title: '已下发至供应商', desc: '供应商可确认接收或申诉', timestamp: new Date().toLocaleString('zh-CN'), type: 'primary' }); }
                releaseDialogVisible.value = false; currentReleaseRow.value = null; releaseChecked.value = [];
                ElementPlus.ElMessage.success('已下发至供应商，供应商可在「我的报告」中确认接收或申诉');
            };

            const rejectAppeal = (row) => {
                delete row.appeal;
                ElementPlus.ElMessage.warning('已驳回申诉，维持原报告');
            };
            const acceptAppeal = (row) => {
                delete row.appeal;
                ElementPlus.ElMessage.success('已接受申诉，待重新核查');
            };

            return {
                menuConfig, currentUser, openPage, sidebarCollapsed, toggleSidebar, activeMenuId,
                query, reportList, filteredReportList,
                uploadSealedVisible, releaseDialogVisible, releaseChecked,
                handleSearch, handleReset, viewDetail, downloadPackage, getDocStatusText,
                onSealedFileChange, openUploadSealed, submitUploadSealed, openReleaseDialog, submitRelease,
                rejectAppeal, acceptAppeal
            };
        }
    });
</script>
</body>
</html>
