<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>该页面已废弃 - 中心运营端</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/operator.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.js"></script>
    <script src="../js/layout.js"></script>
</head>
<body>
<div id="app">
    <el-container style="height: 100vh;">
        <el-aside :width="sidebarCollapsed ? '64px' : '220px'" style="background-color: #001529; display: flex; flex-direction: column;">
            <div style="height: 60px; line-height: 60px; text-align: center; color: #fff; font-weight: bold; font-size: 18px; border-bottom: 1px solid #002140; flex-shrink: 0;">碳足迹数据服务</div>
            <el-menu :default-active="activeMenuId" :collapse="sidebarCollapsed" background-color="#001529" text-color="#fff" active-text-color="#409EFF" style="border-right: none; flex: 1; overflow-y: auto;">
                <template v-for="item in menuConfig" :key="item.id">
                    <el-sub-menu v-if="item.children" :index="item.id">
                        <template #title><el-icon><component :is="item.icon" /></el-icon><span>{{ item.title }}</span></template>
                        <el-menu-item v-for="child in item.children" :key="child.id" :index="child.id" @click="openPage(child.path)">{{ child.title }}</el-menu-item>
                    </el-sub-menu>
                    <el-menu-item v-else :index="item.id" @click="openPage(item.path)"><el-icon><component :is="item.icon" /></el-icon><span>{{ item.title }}</span></el-menu-item>
                </template>
            </el-menu>
            <div style="flex-shrink: 0; padding: 10px; border-top: 1px solid #002140; text-align: center;">
                <el-button link style="color: #fff; padding: 8px;" @click="toggleSidebar"><el-icon><component :is="sidebarCollapsed ? 'Expand' : 'Fold'" /></el-icon></el-button>
            </div>
        </el-aside>

        <el-container style="background: #f0f2f5;">
            <el-main style="display: flex; align-items: center; justify-content: center; padding: 40px;">
                <el-card shadow="hover" style="max-width: 520px; text-align: center;">
                    <template #header><span>该页面已废弃</span></template>
                    <el-alert type="warning" :closable="false" show-icon style="margin-bottom: 20px;">
                        本 SPA 任务工作台已不再使用。任务详情请从<strong>任务管理</strong>进入，按阶段使用「规则配置 / 数据采集 / LCA 计算 / 核查认证」各页；报告阶段请使用<strong>报告管理</strong>。
                    </el-alert>
                    <el-button type="primary" size="large" @click="goToTaskList">前往任务列表</el-button>
                </el-card>
            </el-main>
        </el-container>
    </el-container>
</div>

<script>
    const { menuConfig, currentUser, openPage, sidebarCollapsed, toggleSidebar, activeMenuId } = SharedLayout.setup();
    const goToTaskList = () => { window.location.href = 'self_operated_task_list.html'; };

    runOperatorApp({
        setup() {
            return { menuConfig, currentUser, openPage, sidebarCollapsed, toggleSidebar, activeMenuId, goToTaskList };
        }
    });
</script>
</body>
</html>
