<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务详情 - 报告与发证</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/operator.css">
  <link rel="stylesheet" href="../css/task_detail.css">
  <link rel="stylesheet" href="../css/clarify_panel.css">

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <script src="https://unpkg.com/@element-plus/icons-vue"></script>
  <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.js"></script>
  <script src="../js/taskDetailLayout.js"></script>
  <script src="../js/mockTasks.js"></script>
  <script src="../js/layout.js"></script>

  <style>
    .certify-file-list { margin-top: 20px; padding: 16px; border: 1px solid #ebeef5; border-radius: 8px; background: #fafbfc; }
    .certify-file-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
    .certify-file-item:last-child { border-bottom: none; }
    .certify-file-item .file-name { color: #303133; }
    .certify-file-item .file-download { color: #409EFF; }
    .task-detail-right-panel-header { padding: 12px 16px; font-weight: 600; font-size: 14px; border-bottom: 1px solid #ebeef5; background: #fafbfc; }
    .task-detail-right-panel-body { padding: 16px; flex: 1; overflow-y: auto; font-size: 13px; }
    .certify-log-item { padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 12px; color: #606266; }
    .certify-log-item .time { color: #909399; margin-right: 8px; }
  </style>
</head>
<body>
<div id="app">
  <el-container style="height: 100vh;">
    <!-- 左侧：运营端主导航 -->
    <el-aside :width="sidebarCollapsed ? '64px' : '220px'" style="background-color: #001529; display: flex; flex-direction: column;">
      <div style="height: 60px; line-height: 60px; text-align: center; color: #fff; font-weight: bold; font-size: 18px; border-bottom: 1px solid #002140; flex-shrink: 0;">碳足迹数据服务</div>
      <el-menu :default-active="activeMenuId" :collapse="sidebarCollapsed" background-color="#001529" text-color="#fff" active-text-color="#409EFF" style="border-right: none; flex: 1; overflow-y: auto;">
        <template v-for="item in menuConfig" :key="item.id">
          <el-sub-menu v-if="item.children" :index="item.id">
            <template #title><el-icon><component :is="item.icon" /></el-icon><span>{{ item.title }}</span></template>
            <el-menu-item v-for="child in item.children" :key="child.id" :index="child.id" @click="openPage(child.path)">{{ child.title }}</el-menu-item>
          </el-sub-menu>
          <el-menu-item v-else :index="item.id" @click="openPage(item.path)">
            <el-icon><component :is="item.icon" /></el-icon><span>{{ item.title }}</span>
          </el-menu-item>
        </template>
      </el-menu>
      <div style="flex-shrink: 0; padding: 10px; border-top: 1px solid #002140; text-align: center;">
        <el-button link style="color: #fff; padding: 8px;" :aria-label="sidebarCollapsed ? '展开侧栏' : '折叠侧栏'" @click="toggleSidebar">
          <el-icon><component :is="sidebarCollapsed ? 'Expand' : 'Fold'" /></el-icon>
        </el-button>
      </div>
    </el-aside>

    <el-container style="flex-direction: column; min-height: 0;">
      <el-header style="background: #fff; border-bottom: 1px solid #dcdfe6; height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; flex-shrink: 0;">
        <div style="display: flex; align-items: center;">
          <el-button icon="ArrowLeft" circle style="margin-right: 15px;" aria-label="返回" @click="goBack"></el-button>
          <el-breadcrumb separator="/">
            <el-breadcrumb-item>中心运营端</el-breadcrumb-item>
            <el-breadcrumb-item>任务管理</el-breadcrumb-item>
            <el-breadcrumb-item>报告与发证</el-breadcrumb-item>
          </el-breadcrumb>
        </div>
        <div style="display: flex; align-items: center;">
          <el-avatar :size="32" style="background: #409EFF; margin-right:8px">{{ currentUser.name ? currentUser.name.slice(0,1) : '运' }}</el-avatar>
          <span style="font-size: 14px; color: #606266;">{{ currentUser.name }}</span>
          <el-button v-if="showPortalInHeader" link type="primary" style="margin-left: 12px;" @click="goPortal">返回门户</el-button>
        </div>
      </el-header>

      <el-main style="padding: 0; overflow: hidden; display: flex; flex-direction: column;">
        <div class="task-detail-unified" style="flex: 1; min-height: 0; display: flex; flex-direction: column;">
          <!-- 顶部：5 阶段进度条 + 任务基础信息 -->
          <header class="task-detail-unified__top">
            <div class="task-detail-unified-top-inner">
              <el-steps :active="activeStepIndex" finish-status="success" align-center class="task-stage-steps">
                <el-step
                  v-for="s in stageSteps"
                  :key="s.key"
                  :title="s.label"
                  :class="{ 'is-clickable': s.key !== currentStage }"
                  @click="goStage(s)"
                />
              </el-steps>
              <div class="task-info-dashboard task-info-dashboard__row">
                <div class="task-info-dashboard__main task-info-dashboard__info">
                  <div class="dash-info-col dash-info-col--ids">
                    <div class="dash-info-item"><span class="prod-label">任务编号</span><span class="prod-id">{{ taskInfo.taskId }}</span></div>
                    <div class="dash-info-item"><span class="prod-label">订单</span><el-link type="primary" :underline="false" @click="viewOrder">{{ taskInfo.orderNo }}</el-link></div>
                  </div>
                  <div class="dash-info-col dash-info-col--detail">
                    <div class="dash-info-item"><span class="prod-label">供应商</span><el-link type="primary" :underline="false" @click="viewSupplier">{{ taskInfo.supplier }}</el-link></div>
                    <div class="dash-info-item"><span class="prod-label">产品</span><span class="prod-value">{{ taskInfo.productName }}</span></div>
                    <div class="dash-info-item"><span class="prod-label">规格</span><span class="prod-value">{{ taskInfo.specs }}</span></div>
                  </div>
                </div>
                <div class="task-info-dashboard__status-bar">
                  <div class="dash-block dash-block-status">
                    <div class="dash-content">
                      <el-tag type="success">{{ statusText }}</el-tag>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </header>

          <!-- 主体：中央业务区 | 右侧协作日志（仅保留顶部阶段进度条） -->
          <div class="task-detail-unified__body">
            <main class="task-detail-unified__center">
              <div id="stage-content-container" style="padding: 20px;">

                <!-- L3_OPERATOR：中心运营 - 任务结束展示 + 引导前往报告管理 -->
                <template v-if="currentRole === 'L3_OPERATOR'">
                  <el-result icon="success" title="核查已完成，任务处理结束" sub-title="核查机构已提交核查报告与声明证书，本任务的流转已终止。">
                    <template #extra>
                      <el-button type="primary" size="large" @click="goReportMgt">前往【报告管理】处理发证与归档</el-button>
                    </template>
                  </el-result>
                  <div class="certify-file-list">
                    <div style="font-weight: 600; font-size: 13px; margin-bottom: 12px; color: #303133;">L4 提交的核查报告与声明证书</div>
                    <div v-for="(f, idx) in verifyFiles" :key="idx" class="certify-file-item">
                      <span class="file-name"><el-icon><Document /></el-icon> {{ f.name }}</span>
                      <el-link type="primary" :underline="false" class="file-download" @click="downloadFile(f)">下载</el-link>
                    </div>
                  </div>
                </template>

                <!-- L2_SUPPLIER：供应商 - 等待正式报告下发 -->
                <template v-else-if="currentRole === 'L2_SUPPLIER'">
                  <el-result
                    icon="success"
                    title="核查已通过，等待正式报告下发"
                    sub-title="中心运营正在为您生成正式的碳足迹核算报告及相关凭证。届时您可在左侧主菜单的【碳足迹报告】中查看、确认接收或提出异议。"
                  ></el-result>
                </template>

                <!-- L4_CERTIFIER：核查机构 - 核查结束 + 自身提交文件归档 -->
                <template v-else-if="currentRole === 'L4_CERTIFIER'">
                  <el-result
                    icon="success"
                    title="核查任务已圆满结束"
                    sub-title="感谢您的核查。下方为您提交的最终核查文件归档。"
                  ></el-result>
                  <div class="certify-file-list">
                    <div style="font-weight: 600; font-size: 13px; margin-bottom: 12px; color: #303133;">您提交的核查报告与声明证书</div>
                    <div v-for="(f, idx) in verifyFiles" :key="idx" class="certify-file-item">
                      <span class="file-name"><el-icon><Document /></el-icon> {{ f.name }}</span>
                      <el-link type="primary" :underline="false" class="file-download" @click="downloadFile(f)">下载</el-link>
                    </div>
                  </div>
                </template>

              </div>
            </main>

            <aside class="task-detail-unified__right">
              <div id="task-detail-right-panel" class="task-detail-right-panel">
                <div class="task-detail-right-panel-header">协作日志</div>
                <div class="task-detail-right-panel-body">
                  <div v-for="(log, idx) in certifyLogs" :key="idx" class="certify-log-item">
                    <span class="time">{{ log.time }}</span><span>{{ log.content }}</span>
                  </div>
                  <el-empty v-if="!certifyLogs.length" description="暂无记录" :image-size="48"></el-empty>
                </div>
              </div>
            </aside>
          </div>
        </div>
      </el-main>
    </el-container>
  </el-container>
</div>

<script>
(function () {
  var layoutApi = SharedLayout.setup();
  var menuConfig = layoutApi.menuConfig;
  var currentUser = layoutApi.currentUser;
  var openPage = layoutApi.openPage;
  var sidebarCollapsed = layoutApi.sidebarCollapsed;
  var toggleSidebar = layoutApi.toggleSidebar;
  var activeMenuId = layoutApi.activeMenuId;
  var goPortal = layoutApi.goPortal;
  var showPortalInHeader = layoutApi.showPortalInHeader;

  var taskInfo = typeof getTaskInfoFromUrl === 'function'
    ? getTaskInfoFromUrl('TSK-2026-889')
    : { taskId: 'TSK-2026-889', orderNo: 'ORD-20260203-001', supplier: '示例供应商', productName: '热轧卷板', specs: 'Q235B' };
  var taskId = (typeof getTaskIdFromUrl === 'function' ? getTaskIdFromUrl() : '') || taskInfo.taskId || '';
  var currentStage = 'report';
  var currentRole = window.TaskDetailLayout ? window.TaskDetailLayout.getCurrentRole() : 'L3_OPERATOR';
  var stageSteps = window.TaskDetailLayout ? window.TaskDetailLayout.getStageSteps(taskId, currentStage, { basePath: 'operator' }) : [];
  var taskRow = typeof getTaskByTaskId === 'function' ? getTaskByTaskId(taskId, 4) : null;

  var app = Vue.createApp({
    data: function () {
      return {
        menuConfig: menuConfig,
        currentUser: currentUser,
        openPage: openPage,
        sidebarCollapsed: sidebarCollapsed,
        toggleSidebar: toggleSidebar,
        activeMenuId: activeMenuId,
        goPortal: goPortal,
        showPortalInHeader: showPortalInHeader,
        taskInfo: taskInfo,
        taskRow: taskRow,
        currentStage: currentStage,
        stageSteps: stageSteps,
        currentRole: currentRole,
        verifyFiles: [
          { name: 'SGS 核查报告.pdf', url: '#' },
          { name: '核查声明与符合性证书.pdf', url: '#' }
        ],
        certifyLogs: [
          { time: '09:00', content: '配置下发，模板已选定' },
          { time: '10:15', content: '供应商提交填报数据' },
          { time: '11:30', content: 'LCA 计算完成，进入核查' },
          { time: '14:00', content: '核查机构完成核查，提交报告与声明' },
          { time: '14:05', content: '核查已完成，任务处理结束' }
        ]
      };
    },
    computed: {
      activeStepIndex: function () {
        var idx = this.stageSteps.findIndex(function (s) { return s.key === this.currentStage; }.bind(this));
        return idx >= 0 ? idx : 0;
      },
      statusText: function () {
        var base = (this.taskRow && typeof getStageStatusText === 'function')
          ? getStageStatusText(this.taskRow) : '';
        if (base) return base;
        if (this.currentRole === 'L3_OPERATOR') return '任务已结束';
        if (this.currentRole === 'L2_SUPPLIER') return '等待报告下发';
        return '核查已结束';
      }
    },
    methods: {
      goBack: function () {
        window.location.href = (typeof getFromParam !== 'undefined' && getFromParam() === 'order')
          ? 'order.html'
          : 'self_operated_task_list.html';
      },
      goStage: function (step) {
        if (step && step.key !== this.currentStage && step.href) {
          window.location.href = step.href;
        }
      },
      viewOrder: function () {
        ElementPlus.ElMessage('跳转到订单详情');
      },
      viewSupplier: function () {
        ElementPlus.ElMessage('跳转到供应商详情');
      },
      goReportMgt: function () {
        var url = taskId ? 'report_mgt.html?taskId=' + encodeURIComponent(taskId) : 'report_mgt.html';
        window.location.href = url;
      },
      downloadFile: function (f) {
        ElementPlus.ElMessage.info('下载：' + f.name + '（Mock）');
      }
    },
    mounted: function () {
      if (window.TaskDetailLayout && typeof window.TaskDetailLayout.initRightPanel === 'function') {
        window.TaskDetailLayout.initRightPanel('task-detail-right-panel', { taskId: taskId, role: this.currentRole });
      }
    }
  });

  var localeOpt = typeof ElementPlusLocaleZhCn !== 'undefined' ? { locale: ElementPlusLocaleZhCn } : {};
  app.use(ElementPlus, localeOpt);
  if (typeof ElementPlusIconsVue !== 'undefined') {
    for (var k in ElementPlusIconsVue) {
      app.component(k, ElementPlusIconsVue[k]);
    }
  }
  app.mount('#app');
})();
</script>
</body>
</html>
