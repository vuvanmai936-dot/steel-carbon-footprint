<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的报告 - 供应商工作台</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/operator.css">
    <link rel="stylesheet" href="../css/supplier.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.js"></script>
    <script src="../js/supplierLayout.js"></script>
    <style>
        .main-flex-wrapper { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .card { background: #fff; border-radius: 4px; border: 1px solid #ebeef5; padding: 20px; margin-bottom: 16px; }
    </style>
</head>
<body>
<div id="app" v-cloak>
    <el-container style="height: 100vh;">
        <el-aside :width="sidebarCollapsed ? '64px' : '220px'" style="background-color: #001529; display: flex; flex-direction: column;">
            <div style="height: 60px; line-height: 60px; text-align: center; color: #fff; font-weight: bold; font-size: 18px; border-bottom: 1px solid #002140; flex-shrink: 0;">供应商工作台</div>
            <el-menu :default-active="activeMenuId" :collapse="sidebarCollapsed" background-color="#001529" text-color="#fff" active-text-color="#059669" style="border-right: none; flex: 1; overflow-y: auto;">
                <template v-for="item in menuConfig" :key="item.id">
                    <el-menu-item :index="item.id" @click="openPage(item.path)">
                        <el-icon><component :is="item.icon" /></el-icon>
                        <span>{{ item.title }}</span>
                    </el-menu-item>
                </template>
            </el-menu>
            <div style="flex-shrink: 0; padding: 10px; border-top: 1px solid #002140; text-align: center;">
                <el-button link style="color: #fff; padding: 8px;" @click="toggleSidebar">
                    <el-icon><component :is="sidebarCollapsed ? 'Expand' : 'Fold'" /></el-icon>
                </el-button>
            </div>
        </el-aside>

        <el-container style="display: flex; flex-direction: column; overflow: hidden;">
            <el-header style="background: #fff; border-bottom: 1px solid #dcdfe6; height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; flex-shrink: 0;">
                <el-breadcrumb separator="/">
                    <el-breadcrumb-item>供应商工作台</el-breadcrumb-item>
                    <el-breadcrumb-item>我的报告</el-breadcrumb-item>
                </el-breadcrumb>
                <div style="display: flex; align-items: center;">
                    <el-avatar :size="32" style="background: #059669;">供</el-avatar>
                    <span style="margin-left: 8px; font-size: 14px; color: #606266;">{{ currentUser.name }}</span>
                    <el-button link type="primary" style="margin-left: 12px;" @click="goPortal">返回门户</el-button>
                </div>
            </el-header>

            <el-main style="padding: 20px; overflow: auto; background: #f0f2f5;">
                <div class="main-flex-wrapper">
                    <div class="card">
                        <p style="color: #606266; font-size: 13px; margin: 0 0 16px 0;">仅展示运营已下发的报告。请先预览，再选择「确认接收」或点击「我有异议」提交申诉；确认接收后不可再申诉。提交申诉后，运营端报告列表与任务列表将显示「申诉中」。</p>
                        <el-table :data="reportList" border stripe style="width: 100%;" :header-cell-style="{background:'#f5f7fa', color:'#606266', fontWeight:'600'}">
                            <el-table-column prop="taskId" label="任务编号" width="160" />
                            <el-table-column prop="productName" label="产品" min-width="140" />
                            <el-table-column prop="reportStatus" label="报告状态" width="120">
                                <template #default="scope">
                                    <el-tag size="small" :type="scope.row.reportStatus === '已发证' ? 'success' : 'primary'" effect="plain">{{ scope.row.reportStatus }}</el-tag>
                                    <span v-if="scope.row.received" style="margin-left: 6px; font-size: 12px; color: #67C23A;">已确认接收</span>
                                </template>
                            </el-table-column>
                            <el-table-column prop="reportDate" label="报告日期" width="120" />
                            <el-table-column label="操作" width="280" align="center" fixed="right">
                                <template #default="scope">
                                    <el-button link type="primary" size="small" @click="viewReport(scope.row)">预览</el-button>
                                    <el-divider direction="vertical"></el-divider>
                                    <el-button v-if="!scope.row.received" link type="success" size="small" @click="confirmReceive(scope.row)">确认接收</el-button>
                                    <template v-if="!scope.row.received">
                                        <el-divider direction="vertical"></el-divider>
                                        <el-button link type="warning" size="small" @click="openAppeal(scope.row)">我有异议</el-button>
                                    </template>
                                    <span v-else style="font-size: 12px; color: #909399;">已确认接收，不可申诉</span>
                                </template>
                            </el-table-column>
                        </el-table>
                        <el-empty v-if="!reportList.length" description="暂无报告" style="padding: 40px 0;"></el-empty>
                    </div>
                </div>
            </el-main>
        </el-container>
    </el-container>

    <el-dialog v-model="appealDialogVisible" title="我有异议 - 提交申诉" width="520px" destroy-on-close @close="appealForm.reason = ''">
        <el-form label-position="top">
            <el-form-item label="任务/报告">
                <div style="background: #f5f7fa; padding: 8px 12px; border-radius: 4px; font-size: 13px;">{{ currentReport?.taskId }} - {{ currentReport?.productName }}</div>
            </el-form-item>
            <el-form-item label="申诉原因" required>
                <el-input type="textarea" v-model="appealForm.reason" :rows="4" placeholder="请填写对报告结论的异议原因..."></el-input>
            </el-form-item>
            <el-form-item label="附件（可选）">
                <el-upload action="#" :auto-upload="false" :show-file-list="true" :limit="2">
                    <el-button size="small" type="primary" plain>上传</el-button>
                </el-upload>
            </el-form-item>
        </el-form>
        <template #footer>
            <el-button @click="appealDialogVisible = false">取消</el-button>
            <el-button type="primary" :disabled="!appealForm.reason.trim()" @click="submitAppeal">提交申诉</el-button>
        </template>
    </el-dialog>
</div>
<script>
    const { menuConfig, currentUser, openPage, sidebarCollapsed, toggleSidebar, activeMenuId, goPortal } = SupplierLayout.setup();
    runSupplierApp({
        setup() {
            const reportList = Vue.ref([
                { taskId: 'TSK-2025-101', productName: '热轧卷板', reportStatus: '已发证', reportDate: '2025-04-10', received: true },
                { taskId: 'TSK-2026-888', productName: '超高功率石墨电极', reportStatus: '已出报告', reportDate: '2026-02-06', received: false },
                { taskId: 'TSK-2026-889', productName: '普通功率石墨电极', reportStatus: '已下发', reportDate: '2026-02-09', received: false }
            ]);
            const appealDialogVisible = Vue.ref(false);
            const currentReport = Vue.ref(null);
            const appealForm = Vue.reactive({ reason: '' });

            const viewReport = (row) => { ElementPlus.ElMessage.info('预览报告：' + row.taskId + '（演示）'); };
            const confirmReceive = (row) => {
                row.received = true;
                ElementPlus.ElMessage.success('已确认接收报告，不可再申诉');
            };
            const openAppeal = (row) => {
                currentReport.value = row;
                appealForm.reason = '';
                appealDialogVisible.value = true;
            };
            const submitAppeal = () => {
                if (!appealForm.reason.trim()) return;
                ElementPlus.ElMessage.success('申诉已提交，运营端报告列表与任务列表将显示「申诉中」');
                appealDialogVisible.value = false;
            };
            return {
                menuConfig, currentUser, openPage, sidebarCollapsed, toggleSidebar, activeMenuId, goPortal,
                reportList, viewReport, confirmReceive, openAppeal, appealDialogVisible, currentReport, appealForm, submitAppeal
            };
        }
    });
</script>
</body>
</html>
