<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>合并填报 - 供应商工作台</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/operator.css">
    <link rel="stylesheet" href="../css/supplier.css">
    <link rel="stylesheet" href="../css/task_detail.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.js"></script>
    <script src="../js/mockTasks.js"></script>
    <script src="../js/mockMessages.js"></script>
    <script src="../js/supplierLayout.js"></script>
    <link rel="stylesheet" href="https://cdn.grapecity.com/spreadjs/hosted/css/gc.spread.sheets.excel2013white.16.0.0.css">
    <script src="https://cdn.grapecity.com/spreadjs/hosted/scripts/gc.spread.sheets.all.16.0.0.min.js"></script>
    <script src="../js/spreadUtils.js"></script>
    <style>
        .batch-fill-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; background: #f0f2f5; }
        .spread-host { width: 100%; min-height: 320px; flex: 1; }
        .evidence-card { border: 1px solid #dcdfe6; background: #fff; padding: 12px; border-radius: 4px; margin-bottom: 10px; }
        .panel-footer-fill { padding: 12px 16px; background: #fff; border-top: 1px solid #e4e7ed; display: flex; gap: 8px; flex-wrap: wrap; }
    </style>
</head>
<body>
<div id="app" v-cloak>
    <el-container style="height: 100vh;">
        <el-aside :width="sidebarCollapsed ? '64px' : '220px'" style="background-color: #001529; display: flex; flex-direction: column;">
            <div style="height: 60px; line-height: 60px; text-align: center; color: #fff; font-weight: bold; font-size: 18px; border-bottom: 1px solid #002140;">供应商工作台</div>
            <el-menu :default-active="activeMenuId" :collapse="sidebarCollapsed" background-color="#001529" text-color="#fff" active-text-color="#059669" style="border-right: none; flex: 1; overflow-y: auto;">
                <template v-for="item in menuConfig" :key="item.id">
                    <el-menu-item :index="item.id" @click="openPage(item.path)">
                        <el-icon><component :is="item.icon" /></el-icon>
                        <span>{{ item.title }}</span>
                    </el-menu-item>
                </template>
            </el-menu>
            <div style="flex-shrink: 0; padding: 10px; border-top: 1px solid #002140; text-align: center;">
                <el-button link style="color: #fff; padding: 8px;" @click="toggleSidebar">
                    <el-icon><component :is="sidebarCollapsed ? 'Expand' : 'Fold'" /></el-icon>
                </el-button>
            </div>
        </el-aside>

        <el-container style="display: flex; flex-direction: column; overflow: hidden;">
            <el-header style="background: #fff; border-bottom: 1px solid #dcdfe6; height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px;">
                <div style="display: flex; align-items: center;">
                    <el-button icon="ArrowLeft" circle style="margin-right: 15px;" @click="goBack"></el-button>
                    <el-breadcrumb separator="/">
                        <el-breadcrumb-item>供应商工作台</el-breadcrumb-item>
                        <el-breadcrumb-item><a href="task_list.html" style="color: inherit;">我的任务</a></el-breadcrumb-item>
                        <el-breadcrumb-item>合并填报</el-breadcrumb-item>
                    </el-breadcrumb>
                </div>
                <div style="display: flex; align-items: center;">
                    <el-badge :value="messageUnreadCount" :hidden="messageUnreadCount === 0" class="msg-badge">
                        <el-button link type="primary" @click="messageCenterVisible = true" style="padding: 8px;">
                            <el-icon :size="20"><component :is="'Bell'"></component></el-icon>
                        </el-button>
                    </el-badge>
                    <span style="font-size: 14px; color: #606266;">订单 {{ orderNo }}</span>
                    <el-avatar :size="32" style="background: #059669; margin-left: 16px;">供</el-avatar>
                    <span style="margin-left: 8px; font-size: 14px; color: #606266;">{{ currentUser.name }}</span>
                    <el-button v-if="showPortalInHeader" link type="primary" style="margin-left: 12px;" @click="goPortal">返回门户</el-button>
                </div>
            </el-header>
            <el-drawer v-model="messageCenterVisible" title="消息中心" direction="rtl" size="400" destroy-on-close>
                <div class="message-center-list">
                    <div v-for="m in messageList" :key="m.messageId" class="message-item" :class="{ unread: !m.read }" @click="goMessage(m)">
                        <div class="msg-item-title">{{ m.title }}</div>
                        <div class="msg-item-desc">{{ m.body }}</div>
                        <div class="msg-item-time">{{ formatMessageTime(m.createdAt) }}</div>
                    </div>
                    <el-empty v-if="!messageList.length" description="暂无消息" :image-size="60"></el-empty>
                </div>
            </el-drawer>

            <div class="batch-fill-body" v-if="taskRows.length">
                <div style="padding: 16px 20px; background: #fff; border-bottom: 1px solid #ebeef5;">
                    <el-tabs v-model="activeTabIndex" type="card" @tab-change="onTabChange">
                        <el-tab-pane v-for="(row, idx) in taskRows" :key="row.taskId" :name="String(idx)">
                            <template #label>
                                <span>{{ row.taskId }} · {{ row.productName }}</span>
                            </template>
                        </el-tab-pane>
                    </el-tabs>
                </div>
                <el-row :gutter="0" style="flex: 1; min-height: 0;">
                    <el-col :span="14" style="height: 100%; display: flex; flex-direction: column; background: #fff; border-right: 1px solid #dcdfe6;">
                        <div style="padding: 10px 20px; border-bottom: 1px solid #eee; background: #fafafa;">
                            <span style="font-weight: bold; font-size: 14px;">工序数据（请填写数值和备注列）</span>
                        </div>
                        <div style="flex: 1; overflow: hidden;">
                            <div ref="spreadHostRef" class="spread-host"></div>
                        </div>
                    </el-col>
                    <el-col :span="10" style="height: 100%; display: flex; flex-direction: column; background: #f9f9f9;">
                        <div style="padding: 10px 20px; border-bottom: 1px solid #dcdfe6; background: #fff; font-weight: bold; font-size: 14px;">凭证上传（本任务）</div>
                        <div style="flex: 1; overflow-y: auto; padding: 15px;">
                            <div v-if="currentTaskRow && (currentTaskRow.snapshot || {}).evidenceRequirements && (currentTaskRow.snapshot.evidenceRequirements).length" style="margin-bottom: 12px;">
                                <div v-for="(req, i) in (currentTaskRow.snapshot.evidenceRequirements)" :key="req.id || i" class="evidence-card">
                                    <div style="font-weight: bold; font-size: 13px;">{{ req.name }}</div>
                                    <div v-if="req.desc" style="font-size: 12px; color: #606266;">{{ req.desc }}</div>
                                </div>
                            </div>
                            <div v-else style="color: #909399; font-size: 12px;">本任务暂无凭证要求</div>
                            <div style="margin-top: 16px;">
                                <el-upload action="#" :auto-upload="false" :show-file-list="true" :on-change="(f, list) => onEvidenceChange(list)" :file-list="currentTaskRow ? (currentTaskRow.evidenceFiles || []) : []">
                                    <el-button type="primary" plain size="small">上传凭证</el-button>
                                </el-upload>
                            </div>
                        </div>
                        <div class="panel-footer-fill">
                            <el-button type="primary" @click="submitAll">提交全部</el-button>
                            <el-button @click="goBack">返回</el-button>
                        </div>
                    </el-col>
                </el-row>
            </div>
            <el-main v-else style="background: #f0f2f5;">
                <el-empty description="暂无待合并填报任务或订单号无效">
                    <el-button type="primary" @click="goBack">返回任务列表</el-button>
                </el-empty>
            </div>
        </el-container>
    </el-container>
</div>
<script>
(function () {
    var params = typeof window !== 'undefined' && window.location && window.location.search ? new URLSearchParams(window.location.search) : {};
    var orderNo = params.get('orderNo') || '';
    var layout = SupplierLayout.setup();
    var supplierName = (layout.currentUser && (layout.currentUser.supplierName || layout.currentUser.companyName || layout.currentUser.name)) || '南通碳素有限公司';
    var rows = typeof getTasksByOrderNoForSupplier === 'function' ? getTasksByOrderNoForSupplier(orderNo, supplierName) : [];
    var taskRows = rows.map(function (r) {
        return {
            taskId: r.taskId,
            orderNo: r.orderNo,
            productName: r.productName,
            specs: r.specs,
            snapshot: r.snapshot || {},
            dirtySnapshot: null,
            evidenceFiles: [],
            rejectReason: r.rejectReason
        };
    });

    runSupplierApp({
        setup() {
            var taskRowsRef = Vue.ref(taskRows);
            var activeTabIndex = Vue.ref('0');
            var spreadHostRef = Vue.ref(null);
            var spreadInstance = Vue.ref(null);
            var lastTabIndex = Vue.ref(0);

            var currentTaskRow = Vue.computed(function () {
                var idx = parseInt(activeTabIndex.value, 10);
                if (isNaN(idx)) return null;
                var list = taskRowsRef.value || [];
                return list[idx] || null;
            });

            function goBack() {
                window.location.href = 'task_list.html';
            }

            function saveCurrentSpreadToTask(saveToIndex) {
                var idx = typeof saveToIndex === 'number' ? saveToIndex : parseInt(activeTabIndex.value, 10);
                if (isNaN(idx)) return;
                var list = taskRowsRef.value || [];
                var row = list[idx];
                if (row && spreadInstance.value && typeof SpreadUtils !== 'undefined' && typeof SpreadUtils.getSnapshotFromSpread === 'function') {
                    row.dirtySnapshot = SpreadUtils.getSnapshotFromSpread(spreadInstance.value, { taskId: row.taskId });
                }
            }

            function createSpreadForIndex(idx) {
                var host = spreadHostRef.value;
                if (!host || typeof SpreadUtils === 'undefined') return;
                var list = taskRowsRef.value || [];
                var row = list[idx];
                if (!row) return;
                var snap = row.dirtySnapshot || row.snapshot;
                if (!snap || !snap.sheetData) return;
                spreadInstance.value = SpreadUtils.createSpreadFromSnapshot(host, snap, { editableCols: [4, 5] });
            }

            function onTabChange(name) {
                saveCurrentSpreadToTask(lastTabIndex.value);
                var nextIdx = typeof name === 'string' ? parseInt(name, 10) : (typeof name === 'number' ? name : parseInt(activeTabIndex.value, 10));
                if (!isNaN(nextIdx)) lastTabIndex.value = nextIdx;
                if (isNaN(nextIdx)) return;
                Vue.nextTick(function () {
                    createSpreadForIndex(nextIdx);
                });
            }

            function onEvidenceChange(fileList) {
                var row = currentTaskRow.value;
                if (row) row.evidenceFiles = fileList || [];
            }

            function submitAll() {
                saveCurrentSpreadToTask(parseInt(activeTabIndex.value, 10));
                var list = taskRowsRef.value || [];
                var submitted = 0;
                for (var i = 0; i < list.length; i++) {
                    var row = list[i];
                    var snap = row.dirtySnapshot || row.snapshot;
                    if (snap && typeof submitTaskData === 'function') {
                        submitTaskData(row.taskId, snap, row.evidenceFiles || []);
                        submitted++;
                    }
                }
                ElementPlus.ElMessage.success('已提交 ' + submitted + ' 个任务，请等待运营审核');
                setTimeout(function () { window.location.href = 'task_list.html'; }, 1200);
            }

            Vue.onMounted(function () {
                Vue.nextTick(function () {
                    if ((taskRowsRef.value || []).length > 0) createSpreadForIndex(0);
                });
            });

            return Object.assign({}, layout, {
                orderNo,
                taskRows: taskRowsRef,
                activeTabIndex,
                spreadHostRef,
                currentTaskRow,
                goBack,
                onTabChange,
                onEvidenceChange,
                submitAll
            });
        }
    });
})();
</script>
</body>
</html>
