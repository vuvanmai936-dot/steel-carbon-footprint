<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>待办任务 - 供应商工作台</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/operator.css">
    <link rel="stylesheet" href="../css/supplier.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.js"></script>
    <script src="../js/mockClarifications.js"></script>
    <script src="../js/mockTasks.js"></script>
    <script src="../js/supplierLayout.js"></script>
    <style>
        .main-flex-wrapper { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .card { background: #fff; border-radius: 4px; border: 1px solid #ebeef5; padding: 20px; margin-bottom: 16px; }
    </style>
</head>
<body>
<div id="app" v-cloak>
    <el-container style="height: 100vh;">
        <el-aside :width="sidebarCollapsed ? '64px' : '220px'" style="background-color: #001529; display: flex; flex-direction: column;">
            <div style="height: 60px; line-height: 60px; text-align: center; color: #fff; font-weight: bold; font-size: 18px; border-bottom: 1px solid #002140; flex-shrink: 0;">供应商工作台</div>
            <el-menu :default-active="activeMenuId" :collapse="sidebarCollapsed" background-color="#001529" text-color="#fff" active-text-color="#059669" style="border-right: none; flex: 1; overflow-y: auto;">
                <template v-for="item in menuConfig" :key="item.id">
                    <el-menu-item :index="item.id" @click="openPage(item.path)">
                        <el-icon><component :is="item.icon" /></el-icon>
                        <span>{{ item.title }}</span>
                    </el-menu-item>
                </template>
            </el-menu>
            <div style="flex-shrink: 0; padding: 10px; border-top: 1px solid #002140; text-align: center;">
                <el-button link style="color: #fff; padding: 8px;" @click="toggleSidebar">
                    <el-icon><component :is="sidebarCollapsed ? 'Expand' : 'Fold'" /></el-icon>
                </el-button>
            </div>
        </el-aside>

        <el-container style="display: flex; flex-direction: column; overflow: hidden;">
            <el-header style="background: #fff; border-bottom: 1px solid #dcdfe6; height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; flex-shrink: 0;">
                <el-breadcrumb separator="/">
                    <el-breadcrumb-item>供应商工作台</el-breadcrumb-item>
                    <el-breadcrumb-item>待办任务</el-breadcrumb-item>
                </el-breadcrumb>
                <div style="display: flex; align-items: center;">
                    <el-avatar :size="32" style="background: #059669;">供</el-avatar>
                    <span style="margin-left: 8px; font-size: 14px; color: #606266;">{{ currentUser.name }}</span>
                    <el-button link type="primary" style="margin-left: 12px;" @click="goPortal">返回门户</el-button>
                </div>
            </el-header>

            <el-main style="padding: 20px; overflow: auto; background: #f0f2f5;">
                <div class="main-flex-wrapper">
                    <div class="card">
                        <p style="color: #606266; font-size: 13px; margin: 0 0 16px 0;">请完成以下任务的数据填报与凭证上传；若为待澄清/待整改，请按说明补充数据或回复澄清。</p>
                        <el-table :data="taskList" border stripe style="width: 100%;" :header-cell-style="{background:'#f5f7fa', color:'#606266', fontWeight:'600'}">
                            <el-table-column prop="taskId" label="任务编号" width="160" />
                            <el-table-column prop="orderNo" label="关联订单" width="160" />
                            <el-table-column prop="productName" label="产品名称" min-width="140" />
                            <el-table-column prop="specs" label="规格" width="100" />
                            <el-table-column label="类型/状态" width="130">
                                <template #default="scope">
                                    <el-tag size="small" :type="getStatusTagType(scope.row.taskType)" effect="plain">{{ getStatusLabel(scope.row.taskType) }}</el-tag>
                                </template>
                            </el-table-column>
                            <el-table-column label="最新通知" min-width="180" show-overflow-tooltip>
                                <template #default="scope">
                                    <span style="font-size: 12px; color: #606266;">{{ scope.row.rejectReason || scope.row.clarificationText || '—' }}</span>
                                </template>
                            </el-table-column>
                            <el-table-column label="操作" width="100" align="center" fixed="right">
                                <template #default="scope">
                                    <el-button link type="primary" size="small" @click="goHandle(scope.row)">{{ scope.row.taskType === 'clarification' ? '处理' : '填报' }}</el-button>
                                </template>
                            </el-table-column>
                        </el-table>
                        <el-empty v-if="!taskList.length" description="暂无待办任务" style="padding: 40px 0;" />
                    </div>
                </div>
            </el-main>
        </el-container>
    </el-container>
</div>
<script>
    const { menuConfig, currentUser, openPage, sidebarCollapsed, toggleSidebar, activeMenuId, goPortal } = SupplierLayout.setup();
    runSupplierApp({
        setup() {
            const taskList = Vue.ref(typeof getSupplierTaskList === 'function' ? getSupplierTaskList(currentUser.supplierName || currentUser.name) : []);
            const getStatusTagType = (t) => ({ pending_fill: 'warning', rejected_collect: 'danger', clarification: 'warning' }[t] || 'info');
            const getStatusLabel = (t) => ({ pending_fill: '待填报', rejected_collect: '采集已驳回', clarification: '待澄清/待整改' }[t] || t);
            const goHandle = (row) => {
                if (row.taskType === 'clarification') {
                    window.location.href = 'task_clarify.html?taskId=' + encodeURIComponent(row.taskId);
                } else {
                    window.location.href = 'task_fill.html?taskId=' + encodeURIComponent(row.taskId) + (row.rejectReason ? '&rejected=1' : '');
                }
            };
            return {
                menuConfig, currentUser, openPage, sidebarCollapsed, toggleSidebar, activeMenuId, goPortal,
                taskList, getStatusTagType, getStatusLabel, goHandle
            };
        }
    });
</script>
</body>
</html>
